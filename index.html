<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>9299婚禮報到 · Wedding Check-in</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Serif+TC:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  :root {
    --cream: #f8f4ee;
    --champagne: #e8d5b7;
    --rose: #c9a090;
    --deep-rose: #9c6b5e;
    --gold: #c8a96e;
    --dark: #2c2018;
    --text: #4a3728;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    font-family: 'Noto Serif TC', serif;
    color: var(--text);
    overflow-x: hidden;
  }

  /* ── Hero ── */
  .hero {
    position: relative;
    height: 100vh;
    min-height: 600px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 60px;
  }

  .hero-photo {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to bottom, rgba(44,32,24,0.1) 0%, rgba(44,32,24,0.55) 100%),
      url('wedding.jpg') center/cover no-repeat;
    transform: scale(1.04);
    animation: slowZoom 18s ease-in-out infinite alternate;
  }

  @keyframes slowZoom {
    from { transform: scale(1.04); }
    to   { transform: scale(1.12); }
  }

  /* floating petals */
  .petals { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .petal {
    position: absolute;
    width: 8px; height: 12px;
    background: rgba(201,160,144,0.55);
    border-radius: 50% 0 50% 0;
    animation: fall linear infinite;
    top: -20px;
  }
  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg) translateX(0); opacity: .8; }
    100% { transform: translateY(110vh) rotate(360deg) translateX(60px); opacity: 0; }
  }

  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    color: white;
    animation: fadeUp .9s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hero-label {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(13px, 2vw, 16px);
    letter-spacing: .3em;
    color: var(--champagne);
    margin-bottom: 14px;
  }

  .hero-names {
    font-family: 'Playfair Display', serif;
    font-size: clamp(42px, 9vw, 80px);
    font-weight: 600;
    line-height: 1.1;
    letter-spacing: .06em;
    text-shadow: 0 2px 20px rgba(0,0,0,.3);
  }

  .hero-amp {
    font-style: italic;
    font-weight: 400;
    color: var(--champagne);
    margin: 0 12px;
  }

  .hero-date {
    margin-top: 10px;
    font-size: clamp(12px, 1.8vw, 15px);
    letter-spacing: .25em;
    color: rgba(255,255,255,.75);
    font-weight: 300;
  }

  .divider-line {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px auto;
    width: 220px;
  }
  .divider-line::before,
  .divider-line::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(200,169,110,.6);
  }
  .divider-icon { color: var(--gold); font-size: 16px; }

  .btn-checkin {
    margin-top: 6px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, var(--gold), #e2c07a, var(--gold));
    background-size: 200% 200%;
    color: var(--dark);
    border: none;
    padding: 16px 44px;
    font-family: 'Noto Serif TC', serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: .15em;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 8px 32px rgba(200,169,110,.45);
    transition: transform .2s, box-shadow .2s;
    animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .btn-checkin:hover { transform: translateY(-3px); box-shadow: 0 14px 40px rgba(200,169,110,.55); }
  .btn-checkin svg { width: 20px; height: 20px; }

  .scroll-hint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,.5);
    font-size: 11px;
    letter-spacing: .2em;
    animation: bounce 2s ease-in-out infinite;
  }
  @keyframes bounce { 0%,100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(6px); } }

  /* ── Modal Overlay ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(44,32,24,.72);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: overlayIn .25s ease;
  }
  @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--cream);
    border-radius: 20px;
    padding: 36px 32px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 24px 80px rgba(0,0,0,.35);
    animation: modalIn .3s cubic-bezier(.34,1.56,.64,1) both;
    position: relative;
  }
  @keyframes modalIn { from { opacity: 0; transform: scale(.88) translateY(20px); } to { opacity: 1; transform: none; } }

  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    background: none; border: none;
    cursor: pointer;
    color: var(--deep-rose);
    font-size: 22px;
    line-height: 1;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    transition: background .15s;
  }
  .modal-close:hover { background: rgba(156,107,94,.12); }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    text-align: center;
    color: var(--dark);
    margin-bottom: 4px;
  }
  .modal-sub {
    text-align: center;
    font-size: 12px;
    color: var(--rose);
    letter-spacing: .2em;
    margin-bottom: 24px;
  }

  /* Steps */
  .steps { display: flex; justify-content: center; gap: 0; margin-bottom: 28px; }
  .step {
    display: flex; flex-direction: column; align-items: center;
    position: relative; flex: 1; max-width: 80px;
  }
  .step:not(:last-child)::after {
    content: '';
    position: absolute;
    top: 14px; left: calc(50% + 14px);
    width: calc(100% - 28px);
    height: 2px;
    background: var(--champagne);
    z-index: 0;
    transition: background .3s;
  }
  .step.done:not(:last-child)::after { background: var(--gold); }
  .step-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--champagne);
    color: var(--text);
    font-size: 12px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    z-index: 1;
    transition: background .3s, color .3s;
    border: 2px solid transparent;
  }
  .step.active .step-dot { background: var(--gold); color: var(--dark); border-color: var(--gold); }
  .step.done .step-dot { background: var(--deep-rose); color: white; }
  .step-label { font-size: 10px; margin-top: 5px; letter-spacing: .05em; color: var(--rose); text-align: center; }

  /* Scanner view */
  .scanner-view { display: none; }
  .scanner-view.active { display: block; }

  #qr-reader {
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid var(--champagne);
  }
  #qr-reader video { border-radius: 10px; }

  .scanner-hint {
    text-align: center;
    font-size: 12px;
    color: var(--rose);
    margin-top: 10px;
    letter-spacing: .05em;
  }

  .btn-manual {
    width: 100%;
    margin-top: 12px;
    padding: 10px;
    background: none;
    border: 1px solid var(--champagne);
    border-radius: 10px;
    font-family: 'Noto Serif TC', serif;
    font-size: 13px;
    color: var(--deep-rose);
    cursor: pointer;
    letter-spacing: .1em;
    transition: background .15s;
  }
  .btn-manual:hover { background: rgba(201,160,144,.1); }

  /* Form view */
  .form-view { display: none; }
  .form-view.active { display: block; }

  .qr-result-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(200,169,110,.15);
    border: 1px solid var(--gold);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 20px;
    font-size: 12px;
    color: var(--text);
  }
  .qr-result-badge svg { color: var(--gold); flex-shrink: 0; }
  .qr-result-text { flex: 1; word-break: break-all; }

  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-size: 12px;
    letter-spacing: .15em;
    color: var(--deep-rose);
    margin-bottom: 7px;
  }
  .form-input {
    width: 100%;
    padding: 12px 16px;
    background: white;
    border: 1.5px solid var(--champagne);
    border-radius: 10px;
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    color: var(--dark);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .form-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(200,169,110,.18);
  }

  .count-control {
    display: flex;
    align-items: center;
    gap: 0;
    border: 1.5px solid var(--champagne);
    border-radius: 10px;
    overflow: hidden;
    background: white;
  }
  .count-btn {
    width: 44px; height: 44px;
    background: none;
    border: none;
    font-size: 22px;
    color: var(--deep-rose);
    cursor: pointer;
    transition: background .15s;
    flex-shrink: 0;
  }
  .count-btn:hover { background: rgba(201,160,144,.12); }
  .count-num {
    flex: 1;
    text-align: center;
    font-size: 18px;
    font-weight: 600;
    color: var(--dark);
    font-family: 'Playfair Display', serif;
  }

  .btn-submit {
    width: 100%;
    margin-top: 8px;
    padding: 15px;
    background: linear-gradient(135deg, var(--deep-rose), var(--rose));
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Noto Serif TC', serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: .15em;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(156,107,94,.35);
    transition: transform .18s, box-shadow .18s;
  }
  .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(156,107,94,.45); }

  /* Success view */
  .success-view { display: none; text-align: center; }
  .success-view.active { display: block; }

  .success-icon {
    width: 72px; height: 72px;
    margin: 0 auto 16px;
    background: linear-gradient(135deg, var(--gold), #e2c07a);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: popIn .4s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .success-icon svg { color: white; width: 36px; height: 36px; }

  .success-title {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    color: var(--dark);
    margin-bottom: 6px;
  }
  .success-msg { font-size: 14px; color: var(--rose); letter-spacing: .05em; margin-bottom: 20px; line-height: 1.7; }
  .success-info {
    background: rgba(200,169,110,.1);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 22px;
  }
  .success-info-row { display: flex; justify-content: space-between; font-size: 14px; padding: 5px 0; }
  .success-info-key { color: var(--rose); }
  .success-info-val { font-weight: 600; color: var(--dark); }

  .btn-done {
    width: 100%;
    padding: 14px;
    background: var(--champagne);
    color: var(--dark);
    border: none;
    border-radius: 12px;
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: .1em;
    cursor: pointer;
    transition: background .18s;
  }
  .btn-done:hover { background: var(--gold); color: white; }

  /* Confetti */
  .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 200; }
  .conf {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 2px;
    animation: confFall 2.5s ease-out forwards;
  }
  @keyframes confFall {
    0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Records Panel */
  .records-btn {
    position: fixed;
    bottom: 28px; right: 28px;
    z-index: 50;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--deep-rose);
    color: white;
    border: none;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,0,0,.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    transition: transform .18s;
  }
  .records-btn:hover { transform: scale(1.08); }
  .records-badge {
    position: absolute;
    top: -4px; right: -4px;
    background: var(--gold);
    color: var(--dark);
    font-size: 10px;
    font-weight: 700;
    width: 18px; height: 18px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: monospace;
  }

  .records-panel {
    position: fixed;
    bottom: 90px; right: 28px;
    z-index: 50;
    width: 300px;
    max-height: 50vh;
    background: white;
    border-radius: 16px;
    box-shadow: 0 12px 48px rgba(0,0,0,.2);
    overflow: hidden;
    display: none;
    flex-direction: column;
    animation: panelIn .22s ease both;
  }
  @keyframes panelIn { from { opacity: 0; transform: translateY(10px) scale(.96); } to { opacity: 1; transform: none; } }
  .records-panel.open { display: flex; }
  .records-header {
    padding: 16px 20px 12px;
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: var(--dark);
    border-bottom: 1px solid var(--champagne);
    display: flex; justify-content: space-between; align-items: center;
  }
  .records-count { font-size: 12px; color: var(--rose); font-family: 'Noto Serif TC', serif; }
  .records-list { overflow-y: auto; padding: 8px 0; flex: 1; }
  .record-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    font-size: 13px;
    border-bottom: 1px solid rgba(232,213,183,.4);
  }
  .record-item:last-child { border-bottom: none; }
  .record-name { font-weight: 600; color: var(--dark); }
  .record-count { background: var(--champagne); color: var(--dark); padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .record-time { font-size: 11px; color: var(--rose); margin-top: 2px; }
  .records-empty { text-align: center; padding: 24px; color: var(--rose); font-size: 13px; }

  .export-btn {
    margin: 8px 12px;
    padding: 8px;
    background: none;
    border: 1px solid var(--champagne);
    border-radius: 8px;
    font-family: 'Noto Serif TC', serif;
    font-size: 12px;
    color: var(--deep-rose);
    cursor: pointer;
    letter-spacing: .08em;
    transition: background .15s;
    flex-shrink: 0;
  }
  .export-btn:hover { background: rgba(201,160,144,.12); }
</style>
</head>
<body>

<!-- Hero -->
<section class="hero">
  <div class="hero-photo"></div>

  <!-- Floating petals -->
  <div class="petals" id="petals"></div>

  <div class="hero-content">
    <p class="hero-label">Wedding Day</p>
    <h1 class="hero-names">
      昱庭<span class="hero-amp">&amp;</span>容萱
    </h1>
    <p class="hero-date">2026 · 06 · 14 &nbsp;｜&nbsp; 新板希爾頓</p>
    <div class="divider-line"><span class="divider-icon">✦</span></div>
    <!-- 立即報到按鈕已移除 -->
    <button class="btn-checkin" style="margin-left:12px;background:linear-gradient(135deg,#9c6b5e,#c9a090);color:white;" onclick="openStaffScanModal()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.276A1 1 0 0020 7.382V6a2 2 0 00-2-2H6a2 2 0 00-2 2v1.382a1 1 0 00.447 1.342L9 10m6 0v4a2 2 0 01-2 2H7a2 2 0 01-2-2v-4m11 0v4a2 2 0 01-2 2h-2" />
      </svg>
      掃描報到
    </button>
    <button class="btn-checkin" style="margin-left:12px;background:linear-gradient(135deg,#c8a96e,#e8d5b7);color:#2c2018;" onclick="openUploadModal()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
      </svg>
      人數上傳
    </button>
  </div>

  <p class="scroll-hint">▼</p>
</section>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>

    <h2 class="modal-title">婚禮報到</h2>
    <p class="modal-sub">WEDDING CHECK-IN</p>

    <!-- Steps -->
    <div class="steps">
      <div class="step active" id="step1">
        <div class="step-dot">1</div>
        <span class="step-label">掃描<br>QR碼</span>
      </div>
      <div class="step" id="step2">
        <div class="step-dot">2</div>
        <span class="step-label">填寫<br>資料</span>
      </div>
      <div class="step" id="step3">
        <div class="step-dot">3</div>
        <span class="step-label">報到<br>完成</span>
      </div>
    </div>

    <!-- Scanner View -->
    <div class="scanner-view active" id="scannerView">
      <div id="qr-reader"></div>
      <p class="scanner-hint">將 QR Code 對準框內進行掃描</p>
      <button class="btn-manual" onclick="skipToForm()">✏️ 手動輸入（無 QR Code）</button>
    </div>

    <!-- Form View -->
    <div class="form-view" id="formView">
      <div class="qr-result-badge" id="qrBadge">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span class="qr-result-text" id="qrResultText">QR Code 掃描成功</span>
      </div>

      <div class="form-group">
        <label class="form-label">✦ 姓名</label>
        <input class="form-input" id="guestName" type="text" placeholder="請輸入您的姓名" autocomplete="off">
      </div>

      <div class="form-group">
        <label class="form-label">✦ 出席人數</label>
        <div class="count-control">
          <button class="count-btn" onclick="changeCount(-1)">−</button>
          <span class="count-num" id="countDisplay">1</span>
          <button class="count-btn" onclick="changeCount(1)">＋</button>
        </div>
      </div>

      <button class="btn-submit" onclick="submitCheckin()">確認報到</button>
    </div>

    <!-- Success View -->
    <div class="success-view" id="successView">
      <div class="success-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
        </svg>
      </div>
      <h3 class="success-title">報到成功！</h3>
      <p class="success-msg">歡迎蒞臨婚禮現場<br>感謝您與我們共同見證這美好時刻 🌸</p>
      <div class="success-info">
        <div class="success-info-row">
          <span class="success-info-key">賓客姓名</span>
          <span class="success-info-val" id="resultName">—</span>
        </div>
        <div class="success-info-row">
          <span class="success-info-key">出席人數</span>
          <span class="success-info-val" id="resultCount">—</span>
        </div>
        <div class="success-info-row">
          <span class="success-info-key">報到時間</span>
          <span class="success-info-val" id="resultTime">—</span>
        </div>
      </div>
      <button class="btn-done" onclick="resetModal()">完成</button>
    </div>
  </div>
</div>

<!-- Confetti container -->
<div class="confetti-container" id="confettiContainer"></div>
<!-- Excel Upload Modal -->
<div class="modal-overlay" id="uploadModal" onclick="handleUploadOverlayClick(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeUploadModal()">✕</button>
    <h2 class="modal-title">人數上傳</h2>
    <p class="modal-sub">EXCEL UPLOAD</p>
    <div style="margin-top:18px;text-align:center;">
      <input type="file" id="excelFileInput" accept=".xlsx,.xls,.csv" style="margin-bottom:16px;">
      <button class="btn-submit" onclick="uploadExcelFile()">上傳</button>
      <div id="uploadStatus" style="margin-top:12px;font-size:13px;color:#9c6b5e;"></div>
    </div>
  </div>
</div>
<!-- Staff Scan Modal -->
<div class="modal-overlay" id="staffScanModal" onclick="handleStaffOverlayClick(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeStaffScanModal()">✕</button>
    <h2 class="modal-title">掃描報到</h2>
    <p class="modal-sub">QR SCAN / 手動輸入</p>
    <div id="staffScanView">
      <div id="staff-qr-reader"></div>
      <p class="scanner-hint">請將 QR Code 對準框內進行掃描</p>
      <button class="btn-manual" style="margin-bottom:10px;" onclick="showStaffManualInput()">✏️ 手動輸入（無 QR Code）</button>
      <div id="staffScanResult" style="display:none;margin-top:18px;text-align:center;background:#f8f4ee;border-radius:10px;padding:16px 8px;">
        <div style="font-size:15px;color:#9c6b5e;margin-bottom:8px;">掃描結果</div>
        <div id="staffScanName" style="font-size:16px;font-weight:600;color:#2c2018;">—</div>
        <div id="staffScanCount" style="font-size:14px;color:#4a3728;">—</div>
        <div id="staffScanPhone" style="font-size:14px;color:#4a3728;">—</div>
        <button class="btn-submit" style="margin-top:14px;" onclick="submitStaffCheckin()">確認報到</button>
      </div>
      <div id="staffManualInput" style="display:none;margin-top:18px;text-align:center;background:#f8f4ee;border-radius:10px;padding:16px 8px;">
        <div style="font-size:15px;color:#9c6b5e;margin-bottom:8px;">手動輸入</div>
        <input id="manualName" type="text" placeholder="姓名" style="margin-bottom:8px;width:80%;padding:8px;border-radius:6px;border:1px solid #c9a090;"><br>
        <input id="manualCount" type="number" min="1" max="20" placeholder="人數" style="margin-bottom:8px;width:80%;padding:8px;border-radius:6px;border:1px solid #c9a090;"><br>
        <input id="manualPhone" type="text" placeholder="電話" style="margin-bottom:8px;width:80%;padding:8px;border-radius:6px;border:1px solid #c9a090;"><br>
        <button class="btn-submit" style="margin-top:8px;" onclick="submitStaffManualCheckin()">確認報到</button>
      </div>
    </div>
  </div>
</div>

<!-- Records floating button -->
<div style="position:fixed;bottom:28px;right:28px;z-index:50;">
  <div class="records-panel" id="recordsPanel">
    <div class="records-header">
      <span>報到名單</span>
      <span class="records-count" id="totalCount">共 0 人</span>
    </div>
    <div class="records-list" id="recordsList">
      <div class="records-empty">尚無報到記錄</div>
    </div>
    <button class="export-btn" onclick="exportCSV()">⬇ 匯出 CSV</button>
  </div>

  <button class="records-btn" onclick="toggleRecords()" title="報到名單">
    📋
    <span class="records-badge" id="recordsBadge">0</span>
  </button>
</div>

<script>
// ── Petals ──
const petalsEl = document.getElementById('petals');
for (let i = 0; i < 14; i++) {
  const p = document.createElement('div');
  p.className = 'petal';
  p.style.left = Math.random() * 100 + 'vw';
  p.style.animationDuration = (8 + Math.random() * 12) + 's';
  p.style.animationDelay = (Math.random() * 10) + 's';
  p.style.width = (6 + Math.random() * 8) + 'px';
  p.style.height = (9 + Math.random() * 10) + 'px';
  p.style.opacity = .4 + Math.random() * .4;
  petalsEl.appendChild(p);
}

// ── State ──
let guestCount = 1;
let qrCodeResult = '';
let records = [];
let html5QrCode = null;
let staffQrCode = null;
let staffScanData = { name: '', count: '', phone: '', raw: '' };
function showStaffManualInput() {
  stopStaffScanner();
  document.getElementById('staffScanResult').style.display = 'none';
  document.getElementById('staffManualInput').style.display = 'block';
}

// ── Modal ──
function openModal() {
  document.getElementById('modal').classList.add('active');
  startScanner();
}
function openStaffScanModal() {
  document.getElementById('staffScanModal').classList.add('active');
  startStaffScanner();
}
function openUploadModal() {
  document.getElementById('uploadModal').classList.add('active');
  document.getElementById('uploadStatus').textContent = '';
  document.getElementById('excelFileInput').value = '';
}
function closeUploadModal() {
  document.getElementById('uploadModal').classList.remove('active');
}
function handleUploadOverlayClick(e) {
  if (e.target === document.getElementById('uploadModal')) closeUploadModal();
}

function uploadExcelFile() {
  const fileInput = document.getElementById('excelFileInput');
  const status = document.getElementById('uploadStatus');
  if (!fileInput.files.length) {
    status.textContent = '請選擇檔案';
    return;
  }
  const file = fileInput.files[0];
  const formData = new FormData();
  formData.append('file', file);
  status.textContent = '上傳中...';
  fetch('https://d1-template.davidkung007.workers.dev/api/upload_excel', {
    method: 'POST',
    body: formData
  }).then(res => {
    if (!res.ok) throw new Error('HTTP error');
    return res;
  }).then(data => {
    status.textContent = '上傳成功！';
    setTimeout(closeUploadModal, 1200);
  }).catch(err => {
    status.textContent = '上傳失敗，請再試一次';
    console.error(err);
  });
}
function closeStaffScanModal() {
  document.getElementById('staffScanModal').classList.remove('active');
  stopStaffScanner();
  resetStaffScanView();
}
function handleStaffOverlayClick(e) {
  if (e.target === document.getElementById('staffScanModal')) closeStaffScanModal();
}
function resetStaffScanView() {
  document.getElementById('staffScanResult').style.display = 'none';
  document.getElementById('staffScanName').textContent = '—';
  document.getElementById('staffScanCount').textContent = '—';
  document.getElementById('staffScanPhone').textContent = '—';
  staffScanData = { name: '', count: '', phone: '', raw: '' };
  if (document.getElementById('staffManualInput')) {
    document.getElementById('staffManualInput').style.display = 'none';
    document.getElementById('manualName').value = '';
    document.getElementById('manualCount').value = '';
    document.getElementById('manualPhone').value = '';
  }
}
function closeModal() {
  document.getElementById('modal').classList.remove('active');
  stopScanner();
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}
function resetModal() {
  stopScanner().then(() => {
    document.getElementById('modal').classList.remove('active');
    setTimeout(() => {
      showView('scanner');
      updateStep(1);
      guestCount = 1;
      updateCountDisplay();
      document.getElementById('guestName').value = '';
      qrCodeResult = '';
      openModal();
    }, 300);
  });
}

// ── Views ──
function showView(view) {
  document.getElementById('scannerView').classList.toggle('active', view === 'scanner');
  document.getElementById('formView').classList.toggle('active', view === 'form');
  document.getElementById('successView').classList.toggle('active', view === 'success');
}

function updateStep(n) {
  for (let i = 1; i <= 3; i++) {
    const s = document.getElementById('step' + i);
    s.classList.remove('active', 'done');
    if (i < n) s.classList.add('done');
    if (i === n) s.classList.add('active');
  }
}

// ── Scanner ──
let scannerRunning = false;
let staffScannerRunning = false;

function startScanner() {
  if (html5QrCode) return;
  // Clear the qr-reader div in case of leftover DOM from previous session
  document.getElementById('qr-reader').innerHTML = '';
  html5QrCode = new Html5Qrcode("qr-reader");
  const config = { fps: 10, qrbox: { width: 220, height: 220 } };
  html5QrCode.start(
    { facingMode: "environment" },
    config,
    (decodedText) => {
      qrCodeResult = decodedText;
      stopScanner().then(() => {
        document.getElementById('qrResultText').textContent = decodedText;
        showView('form');
        updateStep(2);
      });
    }
  ).then(() => {
    scannerRunning = true;
  }).catch(err => {
    console.warn('Camera error', err);
    html5QrCode = null;
    scannerRunning = false;
  });
}

function startStaffScanner() {
  if (staffQrCode) return;
  document.getElementById('staff-qr-reader').innerHTML = '';
  staffQrCode = new Html5Qrcode("staff-qr-reader");
  const config = { fps: 10, qrbox: { width: 220, height: 220 } };
  staffQrCode.start(
    { facingMode: "environment" },
    config,
    (decodedText) => {
      stopStaffScanner().then(() => {
        staffScanData.raw = decodedText;
        // 預設格式: 名稱,人數,電話
        let parts = decodedText.split('/');
        staffScanData.name = parts[0] || '';
        staffScanData.count = parts[1] || '';
        staffScanData.phone = parts[2] || '';
        document.getElementById('staffScanName').textContent = '姓名：' + staffScanData.name;
        document.getElementById('staffScanCount').textContent = '人數：' + staffScanData.count;
        document.getElementById('staffScanPhone').textContent = '電話：' + staffScanData.phone;
        document.getElementById('staffScanResult').style.display = 'block';
      });
    }
  ).then(() => {
    staffScannerRunning = true;
  }).catch(err => {
    console.warn('Staff Camera error', err);
    staffQrCode = null;
    staffScannerRunning = false;
  });
}

function stopStaffScanner() {
  return new Promise((resolve) => {
    if (staffQrCode && staffScannerRunning) {
      staffQrCode.stop().then(() => {
        staffQrCode = null;
        staffScannerRunning = false;
        resolve();
      }).catch(() => {
        staffQrCode = null;
        staffScannerRunning = false;
        resolve();
      });
    } else {
      if (staffQrCode) {
        try { staffQrCode.clear(); } catch(e) {}
      }
      staffQrCode = null;
      staffScannerRunning = false;
      resolve();
    }
  });
}

function submitStaffCheckin() {
  // 呼叫後端API寫入資料庫
  if (!staffScanData.name || !staffScanData.count) {
    alert('資料不完整，請重新掃描');
    return;
  }
  const now = new Date();
  const timeStr = now.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  // API: name, count, phone, time, qr
  const payload = {
    user_id: encodeURIComponent(staffScanData.phone),
    name: encodeURIComponent(staffScanData.name),
    count: encodeURIComponent(staffScanData.count)
  };
  fetch(`https://d1-template.davidkung007.workers.dev/api/check?user_id=${payload.user_id}&name=${payload.name}&number=${payload.count}`)
  .then(res => {
    if (!res.ok) throw new Error('HTTP error');
    return res;
  }).then(() => {
    alert('報到完成！');
    getchecks(); // 重新抓取最新名單
    closeStaffScanModal();
  }).catch(err => {
    alert('報到失敗，請稍後再試');
    console.error(err);
  });
}

function submitStaffManualCheckin() {
  const name = document.getElementById('manualName').value.trim();
  const count = document.getElementById('manualCount').value.trim();
  const phone = document.getElementById('manualPhone').value.trim();
  if (!name || !count) {
    alert('請輸入姓名與人數');
    return;
  }
  const payload = {
    user_id: encodeURIComponent(phone),
    name: encodeURIComponent(name),
    count: encodeURIComponent(count)
  };
  fetch(`https://d1-template.davidkung007.workers.dev/api/check?user_id=${payload.user_id}&name=${payload.name}&number=${payload.count}`)
  .then(res => {
    if (!res.ok) throw new Error('HTTP error');
    return res;
  }).then(() => {
    alert('報到完成！');
    getchecks();
    closeStaffScanModal();
  }).catch(err => {
    alert('報到失敗，請稍後再試');
    console.error(err);
  });
}

function stopScanner() {
  return new Promise((resolve) => {
    if (html5QrCode && scannerRunning) {
      html5QrCode.stop().then(() => {
        html5QrCode = null;
        scannerRunning = false;
        resolve();
      }).catch(() => {
        html5QrCode = null;
        scannerRunning = false;
        resolve();
      });
    } else {
      if (html5QrCode) {
        try { html5QrCode.clear(); } catch(e) {}
      }
      html5QrCode = null;
      scannerRunning = false;
      resolve();
    }
  });
}

function skipToForm() {
  stopScanner().then(() => {
    qrCodeResult = '手動報到';
    document.getElementById('qrResultText').textContent = '手動輸入（無 QR Code）';
    showView('form');
    updateStep(2);
  });
}

// ── Count ──
function changeCount(d) {
  guestCount = Math.max(1, Math.min(20, guestCount + d));
  updateCountDisplay();
}
function updateCountDisplay() {
  document.getElementById('countDisplay').textContent = guestCount;
}

// ── Submit ──
function submitCheckin() {
  const name = document.getElementById('guestName').value.trim();
  if (!name) {
    document.getElementById('guestName').focus();
    document.getElementById('guestName').style.borderColor = 'var(--rose)';
    return;
  }
  document.getElementById('guestName').style.borderColor = '';

  const now = new Date();
  const timeStr = now.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

  // record
  records.push({ name, count: guestCount, time: timeStr, qr: qrCodeResult });
  updateRecords();

  // show success
  document.getElementById('resultName').textContent = name;
  document.getElementById('resultCount').textContent = guestCount + ' 人';
  document.getElementById('resultTime').textContent = timeStr;
  showView('success');
  updateStep(3);

  // confetti
  launchConfetti();
}

// ── Submit ──
async function getchecks() {
  try {
    // 用 fetch 抓資料
    const response = await fetch('https://d1-template.davidkung007.workers.dev/api/checks'); // 換成你的 API
    if (!response.ok) throw new Error('HTTP 錯誤: ' + response.status);
    
    const data = await response.json();

    records = [];
    // 假設 data 是陣列，每一筆有 name, guestCount, update_at, qrCodeResult
    data.forEach(item => {
      const { name, number, update_at, qrCodeResult } = item;
      records.push({ name, count: number, time: update_at, qr: qrCodeResult });
    });

    // 更新畫面或表格
    updateRecords();

  } catch (error) {
    console.error('抓取資料失敗:', error);
  }
}

window.addEventListener('DOMContentLoaded', getchecks);

// ── Confetti ──
function launchConfetti() {
  const container = document.getElementById('confettiContainer');
  const colors = ['#c8a96e','#e8d5b7','#c9a090','#9c6b5e','#f4e3d0','#fff'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'conf';
      c.style.left = (10 + Math.random() * 80) + 'vw';
      c.style.top = '0';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDuration = (1.5 + Math.random()) + 's';
      c.style.animationDelay = (Math.random() * .5) + 's';
      c.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
      container.appendChild(c);
      setTimeout(() => c.remove(), 3000);
    }, i * 20);
  }
}

// ── Records ──
function updateRecords() {
  const badge = document.getElementById('recordsBadge');
  const totalCount = document.getElementById('totalCount');
  const list = document.getElementById('recordsList');

  const total = records.reduce((s, r) => s + r.count, 0);
  badge.textContent = records.length;
  totalCount.textContent = '共 ' + total + ' 人 / ' + records.length + ' 桌次';

  if (records.length === 0) {
    list.innerHTML = '<div class="records-empty">尚無報到記錄</div>';
    return;
  }
  list.innerHTML = [...records].reverse().map(r => `
    <div class="record-item">
      <div>
        <div class="record-name">${r.name}</div>
        <div class="record-time">${r.time}</div>
      </div>
      <span class="record-count">${r.count} 人</span>
    </div>
  `).join('');
}

function toggleRecords() {
  document.getElementById('recordsPanel').classList.toggle('open');
}

function exportCSV() {
  if (records.length === 0) { alert('尚無報到記錄'); return; }
  const header = '姓名,人數,報到時間,QR Code\n';
  const rows = records.map(r => `${r.name},${r.count},${r.time},${r.qr}`).join('\n');
  const blob = new Blob(['\uFEFF' + header + rows], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '婚禮報到名單.csv';
  a.click();
}
</script>
</body>
</html>
